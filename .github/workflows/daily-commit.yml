name: Daily Auto Commit

on:
  schedule:
    - cron: '0 18 * * *'     # Daily at 12:00 AM Bangladesh Time
  workflow_dispatch:

# ←←←←← ADD THIS PERMISSIONS BLOCK
permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # Important for push

      - name: Make daily change
        run: |
          echo "Daily commit - $(date '+%Y-%m-%d %H:%M:%S')" >> daily-activity-log.txt

      - name: Commit and Push
        run: |
          git config user.name "debarjunmaharaj"
          git config user.email "debarjunmaharaj@users.noreply.github.com"
          
          git add daily-activity-log.txt
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily auto commit $(date '+%Y-%m-%d')"
            git push
          fi
